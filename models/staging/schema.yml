version: 2

models:
  - name: stg_orders
    description: "The primary transaction table containing order status and lifecycle timestamps. One row per order."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'invoiced', 'processing', 'approved', 'unavailable', 'created']

  - name: stg_order_payments
    description: "Payment details for each order. Includes payment type, installments, and transaction value."
    columns:
      - name: order_id
        tests:
          - not_null # Not unique because one order can have multiple payment methods

  - name: stg_order_items
    description: "Line-item details. Links orders to specific products and sellers, including price and freight costs."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: price
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

  - name: stg_customers
    description: "Customer location data. Deduplicated to ensure one record per customer_id."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_products
    description: "Product dimensions and category names. Categories are originally in Portuguese."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_sellers
    description: "Seller location data and unique identifiers for the Olist marketplace."
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null

  - name: stg_order_reviews
    description: "Customer satisfaction scores and feedback messages for specific orders."
    columns:
      - name: review_id
        tests:
          - not_null